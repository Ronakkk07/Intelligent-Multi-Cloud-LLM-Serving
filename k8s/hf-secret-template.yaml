# HuggingFace token — required to download Mistral-7B and Llama-2-13B.
# DO NOT commit this file with a real token. Apply it manually:
#
#   kubectl create secret generic hf-token \
#     --from-literal=token=hf_YOUR_TOKEN_HERE \
#     -n llm-serving
#
# Or decode this template and apply after filling in the token:
#   echo -n "hf_YOUR_TOKEN_HERE" | base64
#   kubectl apply -f hf-secret-template.yaml -n llm-serving
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: llm-serving
type: Opaque
data:
  token: REPLACE_WITH_BASE64_ENCODED_HF_TOKEN
